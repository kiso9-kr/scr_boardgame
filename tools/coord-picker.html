<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>좌표 추출 도구 - 이태원게임</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }

    /* ── 상단 툴바 ── */
    #toolbar {
      background: #16213e;
      border-bottom: 2px solid #0f3460;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    #toolbar h1 { font-size: 1em; color: #e94560; white-space: nowrap; }
    #toolbar label.file-btn {
      background: #0f3460;
      color: #fff;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85em;
      white-space: nowrap;
    }
    #toolbar label.file-btn:hover { background: #1a4a8a; }
    #file-input { display: none; }
    #progress-text { font-size: 0.85em; color: #aaa; margin-left: auto; white-space: nowrap; }
    #btn-export {
      background: #e94560;
      color: #fff;
      border: none;
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85em;
      white-space: nowrap;
    }
    #btn-export:hover { background: #c73652; }
    #btn-clear-all {
      background: #555;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85em;
      white-space: nowrap;
    }
    #btn-clear-all:hover { background: #777; }

    /* ── 메인 레이아웃 ── */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* ── 왼쪽 패널: 칸 목록 ── */
    #side-panel {
      width: 260px;
      flex-shrink: 0;
      background: #16213e;
      border-right: 2px solid #0f3460;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #side-panel-header {
      padding: 10px 12px;
      font-size: 0.8em;
      color: #aaa;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    #square-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    .group-label {
      padding: 6px 12px 3px;
      font-size: 0.7em;
      color: #e94560;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: bold;
    }
    .square-item {
      padding: 5px 12px;
      cursor: pointer;
      font-size: 0.8em;
      display: flex;
      align-items: center;
      gap: 8px;
      border-left: 3px solid transparent;
    }
    .square-item:hover { background: #0f3460; }
    .square-item.selected { background: #0f3460; border-left-color: #e94560; }
    .square-item.done { color: #4caf50; }
    .square-item .check { font-size: 0.9em; width: 14px; flex-shrink: 0; }
    .square-item .sq-id { flex: 1; font-family: monospace; }
    .square-item .sq-type {
      font-size: 0.7em;
      padding: 1px 5px;
      border-radius: 3px;
      background: #0f3460;
      color: #aaa;
    }
    .square-item.done .sq-type { background: #1a3a1a; color: #4caf50; }

    /* ── 오른쪽: 보드 캔버스 영역 ── */
    #board-area {
      flex: 1;
      overflow: auto;
      position: relative;
      background: #0d0d1a;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }
    #board-container {
      position: relative;
      display: inline-block;
      cursor: crosshair;
    }
    #board-img {
      display: block;
      max-width: none;
    }
    /* 마커 점 */
    .marker {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #fff;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: bold;
      color: #fff;
      cursor: pointer;
      z-index: 10;
      transition: transform 0.1s;
    }
    .marker:hover { transform: translate(-50%, -50%) scale(1.4); z-index: 20; }
    .marker .marker-label {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: #fff;
      font-size: 9px;
      white-space: nowrap;
      padding: 1px 4px;
      border-radius: 3px;
      pointer-events: none;
      display: none;
    }
    .marker:hover .marker-label { display: block; }

    /* 빈 상태 안내 */
    #empty-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #444;
      pointer-events: none;
    }
    #empty-hint p { font-size: 1.1em; margin-bottom: 8px; }
    #empty-hint small { font-size: 0.8em; }

    /* 줌 컨트롤 */
    #zoom-controls {
      position: fixed;
      bottom: 16px;
      right: 16px;
      display: flex;
      gap: 6px;
      z-index: 100;
    }
    .zoom-btn {
      background: #16213e;
      border: 1px solid #0f3460;
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1.1em;
    }
    .zoom-btn:hover { background: #0f3460; }
    #zoom-label {
      background: #16213e;
      border: 1px solid #0f3460;
      color: #aaa;
      padding: 0 8px;
      border-radius: 6px;
      font-size: 0.8em;
      display: flex;
      align-items: center;
    }

    /* 내보내기 모달 */
    #export-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #export-modal.open { display: flex; }
    #export-box {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 10px;
      padding: 20px;
      width: 90%;
      max-width: 700px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #export-box h2 { color: #e94560; font-size: 1em; }
    #export-code {
      flex: 1;
      background: #0d0d1a;
      border: 1px solid #0f3460;
      border-radius: 6px;
      padding: 12px;
      font-family: monospace;
      font-size: 0.8em;
      color: #7ec8e3;
      overflow: auto;
      white-space: pre;
      min-height: 200px;
      max-height: 50vh;
    }
    .export-buttons { display: flex; gap: 10px; justify-content: flex-end; }
    .export-buttons button {
      padding: 7px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85em;
    }
    #btn-copy { background: #e94560; color: #fff; }
    #btn-copy:hover { background: #c73652; }
    #btn-close-modal { background: #555; color: #fff; }
    #btn-close-modal:hover { background: #777; }

    /* 선택 안내 배너 */
    #selection-banner {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: #e94560;
      color: #fff;
      padding: 7px 20px;
      border-radius: 20px;
      font-size: 0.85em;
      z-index: 200;
      display: none;
      pointer-events: none;
    }
    #selection-banner.visible { display: block; }
  </style>
</head>
<body>

<!-- 상단 툴바 -->
<div id="toolbar">
  <h1>🗺 좌표 추출 도구</h1>
  <label class="file-btn" for="file-input">📂 이미지 열기</label>
  <input type="file" id="file-input" accept="image/*">
  <span id="progress-text">칸 선택 후 이미지를 클릭하세요</span>
  <button id="btn-export">💾 코드 내보내기</button>
  <button id="btn-clear-all">🗑 전체 초기화</button>
</div>

<!-- 메인 -->
<div id="main">
  <!-- 왼쪽: 칸 목록 -->
  <div id="side-panel">
    <div id="side-panel-header">칸 목록 — 클릭해서 선택 후 이미지 클릭</div>
    <div id="square-list"></div>
  </div>

  <!-- 오른쪽: 보드 이미지 -->
  <div id="board-area">
    <div id="board-container">
      <img id="board-img" src="" style="display:none;">
    </div>
    <div id="empty-hint">
      <p>이미지를 불러오세요</p>
      <small>상단 "이미지 열기" 버튼 클릭</small>
    </div>
  </div>
</div>

<!-- 줌 컨트롤 -->
<div id="zoom-controls">
  <button class="zoom-btn" id="btn-zoom-out">−</button>
  <span id="zoom-label">100%</span>
  <button class="zoom-btn" id="btn-zoom-in">+</button>
  <button class="zoom-btn" id="btn-zoom-fit" title="화면에 맞추기">⊡</button>
</div>

<!-- 선택 안내 배너 -->
<div id="selection-banner"></div>

<!-- 내보내기 모달 -->
<div id="export-modal">
  <div id="export-box">
    <h2>📋 생성된 SQUARE_POSITIONS 코드</h2>
    <div id="export-code"></div>
    <div class="export-buttons">
      <button id="btn-copy">클립보드 복사</button>
      <button id="btn-close-modal">닫기</button>
    </div>
  </div>
</div>

  { group: '최종 경로 (35칸)', id: 'final_21', type: 'chaos' },
  { group: '최종 경로 (35칸)', id: 'final_22', type: 'bills' },
  { group: '최종 경로 (35칸)', id: 'final_23', type: 'credit' },
  { group: '최종 경로 (35칸)', id: 'final_24', type: 'rent' },
  { group: '최종 경로 (35칸)', id: 'final_25', type: 'money' },
  { group: '최종 경로 (35칸)', id: 'final_26', type: 'money' },
  { group: '최종 경로 (35칸)', id: 'final_27', type: 'food' },
  { group: '최종 경로 (35칸)', id: 'final_28', type: 'chaos' },
  { group: '최종 경로 (35칸)', id: 'final_29', type: 'money' },
  { group: '최종 경로 (35칸)', id: 'final_30', type: 'payday' },
  { group: '최종 경로 (35칸)', id: 'final_31', type: 'food' },
  { group: '최종 경로 (35칸)', id: 'final_32', type: 'money' },
  { group: '최종 경로 (35칸)', id: 'final_33', type: 'chaos' },
  { group: '최종 경로 (35칸)', id: 'final_34', type: 'food' },
  { group: '최종 경로 (35칸)', id: 'final_35', type: 'rent' },
];

// 타입별 색상
const TYPE_COLORS = {
  start: '#ff6b6b', goal: '#ffd700', checkpoint: '#a855f7',
  money: '#4ade80', credit: '#38bdf8', chaos: '#f97316',
  payday: '#facc15', rent: '#f87171', food: '#fb923c',
  bills: '#94a3b8', rest: '#818cf8', shortcut: '#34d399',
  dice_event: '#e879f9', moveTo: '#67e8f9',
};

// =============================================
// 상태
// =============================================
const STORAGE_KEY = 'itaewon_coords';
let positions = {};   // { squareId: { x, y } }
let selectedId = null;
let zoom = 1.0;
let imgNaturalW = 0, imgNaturalH = 0;

// localStorage에서 불러오기
function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) positions = JSON.parse(raw);
  } catch(e) {}
}

function saveToStorage() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(positions));
}

// =============================================
// 사이드 패널 렌더링
// =============================================
function renderSquareList() {
  const list = document.getElementById('square-list');
  list.innerHTML = '';

  let currentGroup = null;
  const total = ALL_SQUARES.length;
  const done = ALL_SQUARES.filter(s => positions[s.id]).length;
  document.getElementById('progress-text').textContent = `완료: ${done} / ${total}`;

  ALL_SQUARES.forEach(sq => {
    if (sq.group !== currentGroup) {
      currentGroup = sq.group;
      const label = document.createElement('div');
      label.className = 'group-label';
      label.textContent = sq.group;
      list.appendChild(label);
    }

    const item = document.createElement('div');
    item.className = 'square-item';
    if (positions[sq.id]) item.classList.add('done');
    if (sq.id === selectedId) item.classList.add('selected');
    item.dataset.id = sq.id;

    const color = TYPE_COLORS[sq.type] || '#aaa';
    item.innerHTML = `
      <span class="check">${positions[sq.id] ? '✓' : '○'}</span>
      <span class="sq-id">${sq.id}</span>
      <span class="sq-type" style="color:${color}">${sq.type}</span>
    `;
    item.addEventListener('click', () => selectSquare(sq.id));
    list.appendChild(item);
  });
}

// =============================================
// 칸 선택
// =============================================
function selectSquare(id) {
  selectedId = id;
  renderSquareList();

  const banner = document.getElementById('selection-banner');
  banner.textContent = `선택됨: ${id} — 이미지에서 해당 위치를 클릭하세요`;
  banner.classList.add('visible');

  // 리스트에서 해당 아이템으로 스크롤
  const item = document.querySelector(`.square-item[data-id="${id}"]`);
  if (item) item.scrollIntoView({ block: 'nearest' });
}

// =============================================
// 이미지 클릭 → 좌표 저장
// =============================================
document.getElementById('board-container').addEventListener('click', (e) => {
  if (!selectedId) return;
  const img = document.getElementById('board-img');
  if (!img.src || img.style.display === 'none') return;

  const rect = img.getBoundingClientRect();
  // 화면 좌표 → 이미지 원본 좌표 (줌 보정)
  const x = Math.round((e.clientX - rect.left) / zoom);
  const y = Math.round((e.clientY - rect.top) / zoom);

  positions[selectedId] = { x, y };
  saveToStorage();

  // 다음 미지정 칸으로 자동 이동
  const currentIndex = ALL_SQUARES.findIndex(s => s.id === selectedId);
  const next = ALL_SQUARES.slice(currentIndex + 1).find(s => !positions[s.id]);
  if (next) {
    selectSquare(next.id);
  } else {
    selectedId = null;
    document.getElementById('selection-banner').classList.remove('visible');
  }

  renderMarkers();
  renderSquareList();
});

// =============================================
// 마커 렌더링
// =============================================
function renderMarkers() {
  const container = document.getElementById('board-container');
  container.querySelectorAll('.marker').forEach(m => m.remove());

  ALL_SQUARES.forEach((sq, idx) => {
    if (!positions[sq.id]) return;
    const { x, y } = positions[sq.id];
    const color = TYPE_COLORS[sq.type] || '#aaa';

    const marker = document.createElement('div');
    marker.className = 'marker';
    marker.style.left = (x * zoom) + 'px';
    marker.style.top = (y * zoom) + 'px';
    marker.style.background = color;
    marker.title = sq.id;
    marker.innerHTML = `<span class="marker-label">${sq.id}</span>`;

    // 마커 클릭 → 재선택 (위치 수정)
    marker.addEventListener('click', (e) => {
      e.stopPropagation();
      selectSquare(sq.id);
    });

    container.appendChild(marker);
  });
}

// =============================================
// 이미지 로드
// =============================================
document.getElementById('file-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  const img = document.getElementById('board-img');
  img.src = url;
  img.style.display = 'block';
  document.getElementById('empty-hint').style.display = 'none';

  img.onload = () => {
    imgNaturalW = img.naturalWidth;
    imgNaturalH = img.naturalHeight;
    fitToScreen();
    renderMarkers();
  };
});

// =============================================
// 줌
// =============================================
function setZoom(z) {
  zoom = Math.min(Math.max(z, 0.1), 5);
  const img = document.getElementById('board-img');
  img.style.width = (imgNaturalW * zoom) + 'px';
  img.style.height = (imgNaturalH * zoom) + 'px';
  document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
  renderMarkers();
}

function fitToScreen() {
  const area = document.getElementById('board-area');
  const scaleW = (area.clientWidth - 20) / imgNaturalW;
  const scaleH = (area.clientHeight - 20) / imgNaturalH;
  setZoom(Math.min(scaleW, scaleH));
}

document.getElementById('btn-zoom-in').addEventListener('click',  () => setZoom(zoom * 1.25));
document.getElementById('btn-zoom-out').addEventListener('click', () => setZoom(zoom / 1.25));
document.getElementById('btn-zoom-fit').addEventListener('click', fitToScreen);

// 마우스 휠 줌
document.getElementById('board-area').addEventListener('wheel', (e) => {
  e.preventDefault();
  setZoom(zoom * (e.deltaY < 0 ? 1.1 : 0.9));
}, { passive: false });

// =============================================
// 내보내기
// =============================================
document.getElementById('btn-export').addEventListener('click', () => {
  const lines = ['const SQUARE_POSITIONS = {'];
  ALL_SQUARES.forEach(sq => {
    const pos = positions[sq.id];
    if (pos) {
      lines.push(`  ${sq.id.padEnd(20)}: { x: ${String(pos.x).padStart(4)}, y: ${String(pos.y).padStart(4)} },`);
    } else {
      lines.push(`  // ${sq.id} — 미지정`);
    }
  });
  lines.push('};');

  const doneCount = ALL_SQUARES.filter(s => positions[s.id]).length;
  const totalCount = ALL_SQUARES.length;
  const header = `// 이태원게임 보드 좌표 맵\n// 완료: ${doneCount} / ${totalCount} 칸\n// 이미지 원본 크기 기준 픽셀 좌표\n\n`;

  document.getElementById('export-code').textContent = header + lines.join('\n');
  document.getElementById('export-modal').classList.add('open');
});

document.getElementById('btn-close-modal').addEventListener('click', () => {
  document.getElementById('export-modal').classList.remove('open');
});

document.getElementById('btn-copy').addEventListener('click', () => {
  const text = document.getElementById('export-code').textContent;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('btn-copy').textContent = '✓ 복사됨!';
    setTimeout(() => document.getElementById('btn-copy').textContent = '클립보드 복사', 2000);
  });
});

// =============================================
// 전체 초기화
// =============================================
document.getElementById('btn-clear-all').addEventListener('click', () => {
  if (!confirm('모든 좌표를 초기화하겠습니까?')) return;
  positions = {};
  saveToStorage();
  renderMarkers();
  renderSquareList();
});

// =============================================
// 키보드 단축키
// =============================================
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    selectedId = null;
    document.getElementById('selection-banner').classList.remove('visible');
    renderSquareList();
    document.getElementById('export-modal').classList.remove('open');
  }
  // Delete/Backspace: 현재 선택된 칸 좌표 삭제
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectedId && !e.target.matches('input')) {
    delete positions[selectedId];
    saveToStorage();
    renderMarkers();
    renderSquareList();
  }
});

// =============================================
// 초기화
// =============================================
loadFromStorage();
renderSquareList();
</script>
</body>
</html>
